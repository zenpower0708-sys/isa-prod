<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA Equipment Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="store-header glass-panel" style="border-radius: 0; border-top: none; border-left: none; border-right: none;">
        <div class="store-logo">
            <img src="images/isa-emblem.png" alt="ISA Logo" style="height:48px; border-radius:12px; filter: drop-shadow(0 0 10px rgba(6,182,212,0.3));">
            <h1 class="game-font">ISA <span>STORE</span></h1>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <button class="cart-btn login-btn" onclick="handleAuthClick()" id="login-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span id="login-label">Login</span>
            </button>
            <button onclick="toggleLang()" class="cart-btn" style="background:transparent; border-color:var(--text-dim); color:var(--text); padding:8px;" id="lang-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> 
                <span id="lang-label">KO</span>
            </button>
            <button class="cart-btn" onclick="openModal(LANG[currentLang].modal.readyMsg)" id="cart-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                Cart (0)
            </button>
        </div>
    </header>

    <!-- Main View -->
    <main class="main-container">
        
        <div class="hero-banner fade-in">
            <h2 class="game-font glow-text" id="hero-title">GEAR UP FOR THE WAVES</h2>
            <p id="hero-desc">국제인공서핑협회 검증을 거친 최상의 장비와 제휴 할인 혜택을 만나보세요.</p>
        </div>

        <!-- Mega Event Card -->
        <div class="mega-event-card fade-in" onclick="window.open('/#/cert', '_blank')">
            <div class="event-glow"></div>
            <div class="event-content">
                <div class="event-icon pulse">🎁</div>
                <div class="event-text">
                    <h3 id="banner-title">수강생 전용 제휴 할인 혜택!</h3>
                    <p id="banner-desc">현재 메인 사이트에서 <b>[자격증 응시]</b> 또는 <b>[아카데미 수강]</b>을 신청하시면,<br>쿠팡 및 올리브영에서 즉시 사용할 수 있는 최대 5만원권 제휴 장비 구매 쿠폰을 지급해 드립니다. <span class="highlight">현명한 서퍼들의 필수 선택!</span></p>
                </div>
                <div class="event-arrow">➜</div>
            </div>
        </div>

        <div class="category-tabs" id="category-container">
            <!-- Tabs injected by JS -->
        </div>

        <div class="product-grid" id="product-container">
            <!-- Products injected by JS -->
        </div>

    </main>

    <!-- System Modal (Ready Message) -->
    <div class="modal-overlay" id="sys-modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div style="font-size: 40px; margin-bottom: 20px;">🚧</div>
            <h3 class="game-font" style="color: white; font-size: 20px; margin-bottom: 12px;" id="modal-title">System Message</h3>
            <p id="modal-msg" style="color: var(--text-dim);"></p>
            <button class="btn-buy native" style="margin-top: 24px;" onclick="closeModal()" id="modal-btn">확인</button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal-overlay" id="checkout-modal" onclick="closeCheckout()">
        <div class="modal-box checkout-box" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeCheckout()">✕</button>
            <h3 class="game-font" id="checkout-title" style="color: white; font-size: 20px; margin-bottom: 24px;">주문 및 배송 정보</h3>
            
            <form id="checkout-form" onsubmit="submitOrder(event)">
                <div class="input-group">
                    <label id="lbl-name">주문자 이름</label>
                    <input type="text" id="order-name" required>
                </div>
                <div class="input-group">
                    <label id="lbl-phone">휴대폰 번호</label>
                    <input type="tel" id="order-phone" placeholder="010-0000-0000" required>
                </div>
                <div class="form-row" style="display:flex; gap:12px;">
                    <div class="input-group" style="flex:1;">
                        <label id="lbl-zip">우편번호</label>
                        <div style="display:flex; gap:8px;">
                            <input type="text" id="order-zip" required style="flex:1;">
                            <button type="button" class="btn-buy native search-zip-btn" style="width:auto; padding:0 12px; font-size:12px;" onclick="alert('우편번호 찾기 기능을 준비 중입니다.')">찾기</button>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label id="lbl-addr">배송 기본 주소</label>
                    <input type="text" id="order-addr" required placeholder="도로명 또는 지번 주소">
                </div>
                <div class="input-group">
                    <label id="lbl-detail">상세 주소 (동/호수)</label>
                    <input type="text" id="order-detail" required placeholder="나머지 상세 주소를 입력해주세요">
                </div>
                <div class="input-group">
                    <label id="lbl-request">배송 요청사항</label>
                    <select id="order-request" style="width:100%; padding:12px; background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:8px; color:white;">
                        <option value="none">선택 안 함</option>
                        <option value="front">문 앞에 놓아주세요</option>
                        <option value="security">경비실에 맡겨주세요</option>
                        <option value="direct">직접 수령하겠습니다</option>
                    </select>
                </div>

                <div style="margin-top:24px; text-align:left; font-size:12px; color:var(--text-dim);">
                    <input type="checkbox" id="order-agree" required> <span id="lbl-agree">개인정보 수집 및 배송 정보 제공에 동의합니다.</span>
                </div>

                <button type="submit" class="btn-buy native" style="margin-top: 24px;" id="btn-submit-order">결제하기</button>
            </form>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="login-modal" onclick="closeLoginModal()">
        <div class="modal-box" onclick="event.stopPropagation()" style="max-width:400px;">
            <button class="modal-close" onclick="closeLoginModal()">✕</button>
            <h3 class="game-font" id="login-modal-title" style="color: white; font-size: 24px; margin-bottom: 24px; text-align:center;">로그인</h3>
            
            <form onsubmit="handleLoginSubmit(event)">
                <div class="input-group">
                    <label id="lbl-auth-email">이메일 주소</label>
                    <input type="email" id="auth-email" required>
                </div>
                <div class="input-group">
                    <label id="lbl-auth-pw">비밀번호</label>
                    <input type="password" id="auth-pw" required>
                </div>
                <div id="signup-fields" style="display:none;">
                    <div class="input-group">
                        <label id="lbl-auth-name">이름 (Name)</label>
                        <input type="text" id="auth-name">
                    </div>
                </div>

                <button type="submit" class="btn-buy native" style="margin-top: 24px;" id="btn-auth-submit">로그인</button>
                
                <p onclick="toggleAuthMode()" id="auth-toggle-text" style="margin-top: 20px; text-align: center; font-size: 13px; color: var(--cyan); cursor: pointer; text-decoration: underline;">
                    계정이 없으신가요? 회원가입
                </p>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
